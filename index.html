<!DOCTYPE html>
<html lang="zh-TW">
<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #08090a; --surface: #0f1011; --border: rgba(255,255,255,0.08); --text: #f7f8f8; --text2: #d0d6e0; --text3: #8a8f98; --accent: #7170ff; --accent2: #e8a838; --font: 'Inter', system-ui, -apple-system, sans-serif; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); font-family: var(--font); font-feature-settings: 'cv01', 'ss03'; -webkit-font-smoothing: antialiased; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
  .container { max-width: 900px; width: 100%; }
  .tag { font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 2px; margin-bottom: 16px; }
  h1 { font-size: 56px; font-weight: 500; letter-spacing: -1.23px; line-height: 1.05; margin-bottom: 16px; }
  h1 span { color: var(--accent2); }
  .sub { font-size: 17px; color: var(--text3); margin-bottom: 48px; line-height: 1.5; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 48px; }
  .card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 28px; text-decoration: none; color: inherit; display: block; transition: all 0.2s; position: relative; overflow: hidden; }
  .card:hover { background: rgba(255,255,255,0.04); border-color: var(--accent); transform: translateY(-2px); }
  .card h2 { font-size: 22px; font-weight: 500; letter-spacing: -0.48px; margin-bottom: 8px; }
  .card h2 span { color: var(--accent2); }
  .card p { font-size: 14px; color: var(--text3); line-height: 1.5; }
  .card .meta { font-size: 12px; color: var(--text4); margin-top: 16px; }
  .card .pill { display: inline-block; padding: 2px 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 9999px; font-size: 11px; font-weight: 500; color: var(--text2); margin-top: 8px; }
  .footer { text-align: center; font-size: 13px; color: var(--text4); line-height: 1.8; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 32px; letter-spacing: -0.7px; } }
</style>
</head>
<body>
<div class="container">
  <div class="tag">MURMUR Creative · Taiwan</div>

  <div class="grid">

      <div class="pill">10 頁簡報 · 方向鍵翻頁</div>
    </a>
    <a class="card" href="AI短劇出海團隊組建計劃書簡報.html">
      <h2>📊 團隊<span>組建計劃書</span></h2>
      <p>市場分析、行業痛點、AI+實拍整合、團隊架構、時間線、出海策略、培訓商業模式、飛輪效應、行動清單</p>
      <div class="pill">13 頁簡報 · 方向鍵翻頁</div>
    </a>
  </div>

  <div class="footer">
    johnny.scw@gmail.com<br>
    Based in Taiwan · Serving Global Markets
  </div>
</div>
</body>
</html>
